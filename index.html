<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <title>Docs</title>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Files</h1>
            <div class="storage-info">
                <span id="usage">0 MB</span> / 20 GB
            </div>
        </div>
        <div class="storage-card" id="main-storage-card">
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>
            <p id="storage-status">System Protected • 20GB Limit</p>
        </div>
    </header>

    <main id="file-viewer">
        <div class="empty-state">
            <div class="empty-icon">📁</div>
            <p>No files yet</p>
            <button class="connect-btn">Connect Storage</button>
        </div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="showTab(event, 'files')">
            <span class="nav-icon">📁</span><br>Files
        </button>
        <button class="nav-item" onclick="showTab(event, 'convert')">
            <span class="nav-icon">⚡</span><br>Convert
        </button>
        <button class="nav-item" onclick="showTab(event, 'settings')">
            <span class="nav-icon">⚙️</span><br>Settings
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
